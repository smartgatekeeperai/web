<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Gate Keeper AI - Lights</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/lights.css" />
  </head>

  <body data-page="lights">
    <div id="app"></div>

    <template id="page-content">
      <div class="page-subtitle">
        Manage lights and map them to camera stream IDs for AI control lookup.
      </div>

      <div class="page-controls">
        <button id="add-light-btn" class="primary-btn" type="button">
          <i class="fas fa-plus"></i>
          Add Light
        </button>
      </div>

      <div id="lights-grid" class="lights-grid"></div>
    </template>

    <script src="js/layout.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/lights.js"></script>
  </body>
</html>
